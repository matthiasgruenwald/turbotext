name: TurbotextMac
options:
  bundleIdPrefix: app.turbotext
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ONLY_ACTIVE_ARCH: NO
    MARKETING_VERSION: "1.5"
    CURRENT_PROJECT_VERSION: "15"

packages:
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    exactVersion: 0.18.0

targets:
  TurbotextMac:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Features
      - path: Services
      - path: Views
      - path: Resources
        buildPhase: resources
        excludes:
          - AppIcon.icns
          - Info.plist
          - TurbotextMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.turbotext.mac
        PRODUCT_NAME: Turbotext
        INFOPLIST_FILE: Resources/Info.plist
        INFOPLIST_KEY_CFBundleShortVersionString: $(MARKETING_VERSION)
        INFOPLIST_KEY_CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CODE_SIGN_ENTITLEMENTS: Resources/TurbotextMac.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
    entitlements:
      path: Resources/TurbotextMac.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true

  TurbotextMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: TurbotextMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.turbotext.mac.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Turbotext.app/Contents/MacOS/Turbotext
        BUNDLE_LOADER: $(TEST_HOST)
        GENERATE_INFOPLIST_FILE: YES
